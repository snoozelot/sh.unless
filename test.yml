---
- name: test sh.unless module
  hosts: localhost
  connection: local
  gather_facts: no

  tasks:
    - name: setup test directory
      file:
        path: /tmp/sh-unless-test-target
        state: directory

    - name: ensure directory symlink (first run - creates link)
      sh.unless:
        state: directory-link
        file: /tmp/sh-unless-test-file
        linktarget: /tmp/sh-unless-test-target
        unless_state: test -L "${file}" && test -d "${file}/"
        unless_then: rm -rf "${file}" && ln -s "${linktarget}" "${file}"

    - name: ensure directory symlink (second run - idempotent)
      sh.unless:
        state: directory-link
        file: /tmp/sh-unless-test-file
        linktarget: /tmp/sh-unless-test-target
        unless_state: test -L "${file}" && test -d "${file}/"
        unless_then: rm -rf "${file}" && ln -s "${linktarget}" "${file}"

    - name: cleanup
      file:
        path: "{{ item }}"
        state: absent
      loop:
        - /tmp/sh-unless-test-file
        - /tmp/sh-unless-test-target
